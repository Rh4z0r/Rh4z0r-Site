<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rh4z0r's Edge</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eaf7ff;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("assets/background.svg");
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(2, 7, 18, 0.72);
            z-index: -1;
        }

        .logo {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 220px;
            max-width: calc(100vw - 32px);
            height: auto;
            z-index: 2;
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.35));
        }

        .hero {
            width: min(92vw, 720px);
            padding: 24px;
            padding-top: 96px;
        }

        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            padding: 14px 16px;
            z-index: 5;
            background: rgba(3, 8, 20, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(111, 230, 255, 0.16);
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-link {
            color: #eaf7ff;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .nav-link:hover {
            background: rgba(111, 230, 255, 0.16);
            transform: translateY(-1px);
        }

        .card {
            background: rgba(4, 12, 24, 0.76);
            border: 1px solid rgba(111, 230, 255, 0.25);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(16px);
            padding: 38px 32px;
            text-align: center;
        }

        .eyebrow {
            margin: 0 0 10px;
            text-transform: uppercase;
            letter-spacing: 0.35em;
            font-size: 0.8rem;
            color: #7edcff;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 2.8rem);
            color: #f4fbff;
        }

        .subtitle {
            margin: 0 0 28px;
            font-size: 1.05rem;
            color: #a9c8dd;
            line-height: 1.6;
        }

        .button-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            text-decoration: none;
            border-radius: 999px;
            background: linear-gradient(135deg, #2f8dff, #0b4fae);
            border: 1px solid rgba(255, 255, 255, 0.16);
            box-shadow: 0 10px 24px rgba(47, 141, 255, 0.24);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(47, 141, 255, 0.32);
            background: linear-gradient(135deg, #4da3ff, #1458bf);
        }

        @media (max-width: 720px) {
            .button-row {
                grid-template-columns: 1fr;
            }

            .logo {
                top: 16px;
                right: 16px;
                width: 180px;
            }

            .card {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>

    <img src="assets/logo.svg" alt="Rh4z0r's Edge Logo" class="logo">

    <main class="hero">
        <section class="card">
            <p class="eyebrow">System online</p>
            <h1>Rh4z0r's Edge</h1>
            <p class="subtitle">Willkommen an der digitalen Grenze. Wähle ein Ziel und gehe direkt weiter.</p>

            <div class="button-row">
                <a href="forward.html" class="btn">forward</a>
                <a href="whale.html" class="btn">Whale</a>
                <a href="pyhton.html" class="btn">python terminal</a>
            </div>
        </section>
    </main>
</body>
</html>
